<style>

  .btn-secondary:hover { background:var(--border); }

  .btn-ghost:hover { background:var(--bg-secondary); color:var(--text); }

  .toast-container { position:fixed; top:20px; right:20px; z-index:10000; display:flex; flex-direction:column; gap:8px; }
  .toast { padding:14px 20px; border-radius:12px; font-size:14px; font-weight:500; display:flex; align-items:center; gap:10px; animation:slideIn .3s ease; min-width:280px; max-width:400px; box-shadow:0 8px 30px rgba(0,0,0,.12); }
  .toast-success { background:#F0FDF4; color:#166534; border:1px solid #BBF7D0; }
  .toast-error { background:#FEF2F2; color:#991B1B; border:1px solid #FECACA; }
  .toast-info { background:var(--accent-light); color:#1E40AF; border:1px solid var(--accent-subtle); }
  @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  @keyframes slideOut { from { transform:translateX(0); opacity:1; } to { transform:translateX(100%); opacity:0; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
  .fade-up { animation:fadeUp .6s ease both; }
  .fade-up-1 { animation-delay:.1s; }
  .fade-up-2 { animation-delay:.2s; }
  .fade-up-3 { animation-delay:.3s; }
  .fade-up-4 { animation-delay:.4s; }

  .nav-link { padding:8px 16px; border-radius:10px; font-size:14px; font-weight:500; color:var(--text-secondary); transition:all .2s; cursor:pointer; text-decoration:none; white-space:nowrap; }

  .badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); backdrop-filter:blur(4px); z-index:9000; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeUp .2s ease; }
  .modal { background:#fff; border-radius:20px; padding:32px; max-width:480px; width:100%; box-shadow:0 25px 60px rgba(0,0,0,.15); max-height:90vh; overflow-y:auto; }

  .compare-row:last-child { border-bottom:none; }

  .spinner { width:20px; height:20px; border:2.5px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; display:inline-block; }

  ::-webkit-scrollbar-track { background:transparent; }

  .template-card { border:2px solid var(--border); border-radius:14px; padding:16px; cursor:pointer; transition:all .2s; text-align:center; }

</style>

function getCurSymbol() {
  const c = CURRENCIES.find(x=>x.code===invoiceState.currency);
  return c ? c.symbol : 'RM';
}
function formatMoney(amount) {
  const sym = getCurSymbol();
  if(invoiceState.currency==='IDR') return sym + Math.round(amount).toLocaleString('id-ID');
  return sym + amount.toFixed(2);
}

function toast(msg, type='info') {
  const c = $('toast-container');
  const icons = {success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<i class="fa-solid ${icons[type]}"></i><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{ t.style.animation='slideOut .3s ease forwards'; setTimeout(()=>t.remove(),300); },3500);
}

function showModal(title, body, actions='') {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">${title}</h3><div style="color:var(--text-secondary);font-size:14px;line-height:1.6">${body}</div><div style="display:flex;gap:10px;margin-top:24px;justify-content:flex-end">${actions}</div></div>`;
    overlay.addEventListener('click', e => { if(e.target===overlay){ overlay.remove(); resolve(false); } });
    document.body.appendChild(overlay);
  });
}

async function registerEmail(name, email, password) {
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    await sendEmailVerification(cred.user);
    const username = email.split('@')[0].replace(/[^a-z0-9]/gi,'').toLowerCase() + Math.floor(Math.random()*1000);
    await setDoc(doc(db,'users',cred.user.uid), {
      uid:cred.user.uid, name, email, emailVerified:false,
      username, stats:{bioViews:0,qrScans:0,linkClicks:0},
      plan:'free', createdAt:serverTimestamp()
    });
    track('sign_up',{method:'email'});
    emailVerifiedChecked = false;
    navigate('verify-email');
  } catch(e) {
    const msgs = {'auth/email-already-in-use':'This email is already registered','auth/weak-password':'Password must be at least 6 characters','auth/invalid-email':'Invalid email address'};
    toast(msgs[e.code] || e.message,'error');
  }
}

async function loginEmail(email, password) {
  try {
    await signInWithEmailAndPassword(auth, email, password);
    track('login',{method:'email'});
  } catch(e) {
    const msgs = {'auth/user-not-found':'No account found with this email','auth/wrong-password':'Incorrect password','auth/invalid-credential':'Invalid email or password','auth/invalid-email':'Invalid email address'};
    toast(msgs[e.code] || e.message,'error');
  }
}

async function loginGoogle() {
  try {
    const result = await signInWithPopup(auth, provider);
    const userRef = doc(db,'users',result.user.uid);
    const userSnap = await getDoc(userRef);
    if(!userSnap.exists()) {
      const username = result.user.email.split('@')[0].replace(/[^a-z0-9]/gi,'').toLowerCase() + Math.floor(Math.random()*1000);
      await setDoc(userRef, {
        uid:result.user.uid, name:result.user.displayName||'', email:result.user.email,
        emailVerified:result.user.emailVerified||false, username,
        stats:{bioViews:0,qrScans:0,linkClicks:0}, plan:'free', createdAt:serverTimestamp()
      });
      track('sign_up',{method:'google'});
      toast('Account created with Google!','success');
    } else {
      track('login',{method:'google'});
      toast('Welcome back!','success');
    }
  } catch(e) {
    if(e.code!=='auth/popup-closed-by-user') toast(e.message,'error');
  }
}

async function logoutUser() { await signOut(auth); toast('Signed out','info'); }

async function updateUsername(uid, newUsername) {
  const clean = newUsername.toLowerCase().replace(/[^a-z0-9._-]/g,'');
  if(!clean || clean.length<3) { toast('Username must be at least 3 characters','error'); return false; }
  if(clean.length>20) { toast('Username too long (max 20)','error'); return false; }
  const q = query(collection(db,'users'), where('username','==',clean));
  const snap = await getDocs(q);
  for(const d of snap.docs) { if(d.id!==uid) { toast('Username already taken','error'); return false; } }
  await updateDoc(doc(db,'users',uid), { username:clean });
  userData.username = clean;
  toast('Username updated!','success');
  track('update_username');
  return true;
}

async function loadPublicProfile(username) {
  const q = query(collection(db,'users'), where('username','==',username));
  const snap = await getDocs(q);
  if(!snap.empty) {
    const user = snap.docs[0].data();
    const bioSnap = await getDoc(doc(db,'users',snap.docs[0].id,'data','bio'));
    const bio = bioSnap.exists() ? bioSnap.data() : null;
    await updateDoc(doc(db,'users',snap.docs[0].id), { 'stats.bioViews': increment(1) }).catch(()=>{});
    return { ...user, bio };
  }
  return null;
}

function navigate(page, params={}) {
  currentPage = page;
  window.scrollTo({top:0,behavior:'smooth'});
  const routes = {landing:'/',login:'/login',register:'/register',dashboard:'/dashboard',bio:'/bio',qr:'/qr',resume:'/resume',invoice:'/invoice',pricing:'/pricing',walink:'/walink',profile:'/profile','verify-email':'/verify-email'};
  if(page==='profile') window.history.pushState({},'',`/${params.username}`);
  else if(page==='public-bio') window.history.pushState({},'',`/${params.username}/bio`);
  else window.history.pushState({},'', routes[page]||'/');
  render();
}

window.addEventListener('popstate', () => {
  const path = window.location.pathname.replace(/\/$/,'');
  if(path==='') currentPage='landing';
  else if(path==='/login') currentPage='login';
  else if(path==='/register') currentPage='register';
  else if(path==='/dashboard') currentPage='dashboard';
  else if(path==='/bio') currentPage='bio';
  else if(path==='/qr') currentPage='qr';
  else if(path==='/resume') currentPage='resume';
  else if(path==='/invoice') currentPage='invoice';
  else if(path==='/pricing') currentPage='pricing';
  else if(path==='/walink') currentPage='walink';
  else if(path==='/verify-email') currentPage='verify-email';
  else if(path.startsWith('/')) { currentPage='public-bio'; renderPublicBio(path.slice(1)); return; }
  render();
});

onAuthStateChanged(auth, async user => {
  currentUser = user;
  if(user) {
    await user.reload();
    if(!user.emailVerified && !emailVerifiedChecked) {
      userData = await loadUser(user.uid);
      emailVerifiedChecked = true;
      if(currentPage!=='verify-email') { navigate('verify-email'); return; }
    }
    userData = await loadUser(user.uid);
    if(!userData) userData = { uid:user.uid, name:user.displayName||'', email:user.email, username:user.email.split('@')[0], stats:{bioViews:0,qrScans:0,linkClicks:0}, plan:'free', emailVerified:user.emailVerified };
    if(['landing','login','register','verify-email','pricing'].includes(currentPage)) {
      if(['bio','qr','resume','invoice','walink'].includes(currentPage)) render();
      else navigate('dashboard');
    } else render();
  } else {
    userData = null;
    emailVerifiedChecked = false;
    if(['dashboard','bio','qr','resume','invoice','walink','verify-email'].includes(currentPage)) navigate('landing');
    else render();
  }
});

function render() {
  if(['landing','login','register','verify-email','pricing'].includes(currentPage)) renderPublic();
  else if(currentUser) renderApp();
  else renderPublic();
}

let verifyInterval = null;
function startVerifyCheck() {
  if(verifyInterval) clearInterval(verifyInterval);
  verifyInterval = setInterval(async()=>{
    if(!currentUser) { clearInterval(verifyInterval); return; }
    try {
      await currentUser.reload();
      if(currentUser.emailVerified) {
        clearInterval(verifyInterval);
        await updateDoc(doc(db,'users',currentUser.uid), { emailVerified:true });
        if(userData) userData.emailVerified = true;
        const st = $('verify-status');
        if(st) st.innerHTML = `<div style="display:flex;align-items:center;gap:8px;justify-content:center"><span class="verify-dot green"></span><span style="font-size:14px;color:var(--success);font-weight:600">Email verified!</span></div>`;
        toast('Email verified successfully!','success');
        setTimeout(()=>navigate('dashboard'), 1000);
      }
    } catch(e) {}
  }, 5000);
}

function setupBioDragDrop() {
  const list=$('bio-links-list'); if(!list)return;

  list.querySelectorAll('.link-item').forEach(item=>{

window._generateQR = () => {
  const input=$('qr-input')?.value?.trim(); if(!input){toast('Enter a URL or text','error');return;}
  const size=+($('qr-size')?.value||300);
  const fg=$('qr-color')?.value||'#0F172A';
  const bg=$('qr-bg')?.value||'#FFFFFF';
  const radius=+($('qr-radius')?.value||8);
  const ecMap={L:QRCode.CorrectLevel.L,M:QRCode.CorrectLevel.M,Q:QRCode.CorrectLevel.Q,H:QRCode.CorrectLevel.H};
  const ec=ecMap[$('qr-ec')?.value||'M']||QRCode.CorrectLevel.M;
  const output=$('qr-output');
  output.innerHTML=`<div id="qr-code" style="padding:24px;background:${bg};border-radius:20px;display:inline-block;box-shadow:0 4px 24px rgba(0,0,0,.08)"></div><div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="window._downloadQR('png')"><i class="fa-solid fa-download"></i> PNG</button><button class="btn btn-secondary btn-sm" onclick="window._downloadQR('svg')"><i class="fa-solid fa-download"></i> SVG</button></div>`;
  try {
    new QRCode($('qr-code'),{text:input,width:size,height:size,colorDark:fg,colorLight:bg,correctLevel:ec});
    const canvas=$('qr-code')?.querySelector('canvas');
    if(canvas&&radius>0) {
      const ctx=canvas.getContext('2d');
      const moduleCount=canvas.width/size*21;
      const moduleSize=canvas.width/moduleCount;
      const r=Math.min(radius,moduleSize*0.45);
      const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);
      for(let row=0;row<moduleCount;row++){for(let col=0;col<moduleCount;col++){
        const x=col*moduleSize; const y=row*moduleSize;
        const idx=(Math.floor(y)*canvas.width+Math.floor(x))*4;
        if(imgData.data[idx+3]>128){ctx.fillStyle=fg;ctx.beginPath();ctx.roundRect(x+0.5,y+0.5,moduleSize-1,moduleSize-1,r);ctx.fill();}
      }}
    }
    track('generate_qr'); toast('QR code generated!','success');
  } catch(e){toast('Failed to generate QR','error');}
};

window._downloadQR = (fmt) => {
  const canvas=$('qr-code')?.querySelector('canvas');
  if(!canvas){toast('Generate a QR code first','error');return;}
  if(fmt==='svg') {
    const size=canvas.width;
    const fg=$('qr-color')?.value||'#0F172A';
    const bg=$('qr-bg')?.value||'#FFFFFF';
    const ctx=canvas.getContext('2d');
    const imgData=ctx.getImageData(0,0,size,size);
    const moduleCount=21;
    const moduleSize=size/moduleCount;
    let rects='';
    for(let row=0;row<moduleCount;row++){for(let col=0;col<moduleCount;col++){
      const x=Math.floor(col*moduleSize); const y=Math.floor(row*moduleSize);
      const idx=(y*size+x)*4;
      if(imgData.data[idx+3]>128) rects+=`<rect x="${(col*moduleSize).toFixed(1)}" y="${(row*moduleSize).toFixed(1)}" width="${moduleSize.toFixed(1)}" height="${moduleSize.toFixed(1)}" fill="${fg}"/>`;
    }}
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}"><rect width="${size}" height="${size}" fill="${bg}"/>${rects}</svg>`;
    const blob=new Blob([svg],{type:'image/svg+xml'});
    const a=document.createElement('a');a.download='luviio-qr.svg';a.href=URL.createObjectURL(blob);a.click();
    toast('SVG downloaded!','success');
  } else {
    const a=document.createElement('a');a.download='luviio-qr.png';a.href=canvas.toDataURL('image/png');a.click();
    toast('PNG downloaded!','success');
  }
  track('download_qr');
};

function refreshWaPreview() { /* Re-render WA link section */ renderWaLink(); }

/* ─── Public Bio Page ─── */
async function renderPublicBio(slug) {
  const parts = slug.split('/');
  const username = parts[0];
  if(!username) { navigate('landing'); return; }
  const profile = await loadPublicProfile(username);
  if(!profile) {
    appEl.innerHTML = `<main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;text-align:center">
      <div style="width:100%;max-width:420px">
        <div style="text-align:center;margin-bottom:24px"><a onclick="window._nav('landing')" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--accent);text-decoration:none"><img src="${LOGO_URL}" style="width:20px;height:20px;border-radius:4px" onerror="this.style.display='none'">Appluviio</a></div>
        <div style="background:#fff;border-radius:20px;padding:48px 28px;box-shadow:0 4px 30px rgba(0,0,0,.06);text-align:center">
          <div style="width:72px;height:72px;background:var(--bg-secondary);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px"><i class="fa-solid fa-user-slash" style="font-size:28px;color:var(--text-muted)"></i></div>
          <h1 style="font-size:20px;font-weight:800;margin-bottom:8px">User not found</h1>
          <p style="color:var(--text-secondary);font-size:14px;margin-bottom:24px">This profile doesn't exist or has been removed.</p>
          <a class="btn btn-primary" onclick="window._nav('landing')" style="cursor:pointer">Go to Appluviio</a>
        </div>
      </div>
    </main>`;
    return;
  }
  const bio = profile.bio || {};
  const name = bio.name || profile.name || 'User';
  const avatar = bio.avatar;
  const initial = name[0].toUpperCase();
  const links = bio.links || [];
  const isFree = profile.plan !== 'pro';
  appEl.innerHTML = `<main style="min-height:100vh;background:linear-gradient(180deg,#f1f5f9 0%,#e2e8f0 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px">
    <div style="width:100%;max-width:440px">
      <div style="text-align:center;margin-bottom:24px"><a onclick="window._nav('landing')" style="cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--accent);text-decoration:none"><img src="${LOGO_URL}" style="width:22px;height:22px;border-radius:5px" onerror="this.style.display='none'"><span>Appluviio</span></a></div>
      <div style="background:#fff;border-radius:24px;padding:44px 32px 36px;box-shadow:0 8px 40px rgba(0,0,0,.08);text-align:center">
        ${avatar?`<img src="${esc(avatar)}" style="width:88px;height:88px;border-radius:50%;object-fit:cover;margin:0 auto 16px;border:4px solid #fff;box-shadow:0 4px 20px rgba(0,0,0,.12)" onerror="this.outerHTML='<div style=\\'width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#818CF8);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#fff;font-size:36px;font-weight:800;box-shadow:0 4px 20px rgba(59,130,246,.3)\\'>${initial}</div>'">`
        :`<div style="width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#818CF8);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#fff;font-size:36px;font-weight:800;box-shadow:0 4px 20px rgba(59,130,246,.3)">${initial}</div>`}
        <h1 style="font-size:24px;font-weight:800;letter-spacing:-.3px">${esc(name)}</h1>
        ${bio.bio?`<p style="font-size:14px;color:var(--text-secondary);margin-top:10px;line-height:1.7;max-width:320px;margin-left:auto;margin-right:auto">${esc(bio.bio)}</p>`:''}
        <div style="width:48px;height:3px;background:linear-gradient(90deg,var(--accent),#818CF8);border-radius:2px;margin:20px auto"></div>
        <div style="display:flex;flex-direction:column;gap:12px;margin-top:8px">
          ${links.map(l=>`<a href="${esc(l.url)}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:14px;padding:15px 18px;background:${l.color}08;border:1px solid ${l.color}15;border-radius:16px;text-decoration:none;color:var(--text);font-size:15px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.03);transition:all .2s" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px ${l.color}15';this.style.borderColor='${l.color}30'" onmouseout="this.style.transform='';this.style.boxShadow='0 2px 8px rgba(0,0,0,.03)';this.style.borderColor='${l.color}15'"><div style="width:40px;height:40px;border-radius:12px;background:${l.color}12;color:${l.color};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"><i class="${l.icon}"></i></div><span style="flex:1;text-align:left">${esc(l.title)}</span><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:11px;color:var(--text-muted)"></i></a>`).join('')}
        </div>
        ${!links.length?`<p style="color:var(--text-muted);font-size:14px;padding:24px 0">No links added yet</p>`:''}
        <p style="font-size:11px;color:var(--text-muted);margin-top:28px;opacity:.7">Powered by <a onclick="window._nav('landing')" style="color:var(--accent);cursor:pointer;font-weight:600;text-decoration:none">Appluviio</a>${isFree?' by Luviio':''}</p>
      </div>
    </div>
  </main>`;
}

/* ─── Global Handlers ─── */
window._nav = page => navigate(page);
window._logout = () => { if(verifyInterval) clearInterval(verifyInterval); logoutUser(); };
window._googleLogin = () => loginGoogle();
window._emailLogin = () => {
  const email=$('login-email')?.value?.trim(); const pass=$('login-pass')?.value;
  if(!email||!pass){toast('Please fill in all fields','error');return;}
  loginEmail(email,pass);
};
window._emailRegister = () => {
  const name=$('reg-name')?.value?.trim(); const email=$('reg-email')?.value?.trim(); const pass=$('reg-pass')?.value;
  if(!name||!email||!pass){toast('Please fill in all fields','error');return;}
  if(pass.length<6){toast('Password must be at least 6 characters','error');return;}
  registerEmail(name,email,pass);
};
window._tryDemo = tool => {
  if(!currentUser) { navigate(tool); return; }
  navigate(tool);
};
window._openProfile = () => {
  if(userData?.username) {
    window.open(`https://${BIO_DOMAIN}/${userData.username}/bio`,'_blank');
  } else toast('Set up your username first','error');
};
window._copyText = text => {
  navigator.clipboard.writeText(text).then(()=>toast('Copied to clipboard!','success')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Copied!','success');
  });
};
window._resendVerify = async () => {
  if(currentUser) { try { await sendEmailVerification(currentUser); toast('Verification email sent!','success'); } catch(e) { toast(e.message,'error'); } }
};
window._checkVerify = async () => {
  if(!currentUser) return;
  try { await currentUser.reload(); if(currentUser.emailVerified) { await updateDoc(doc(db,'users',currentUser.uid),{emailVerified:true}); userData.emailVerified=true; toast('Verified!','success'); navigate('dashboard'); } else toast('Email not verified yet. Check your inbox.','info'); } catch(e) { toast(e.message,'error'); }
};
window._editUsername = async () => {
  const overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">Edit Username</h3><p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">Your public bio link:<br><strong style="color:var(--accent)">https://${BIO_DOMAIN}/<span id="un-preview">${userData?.username||''}</span>/bio</strong></p><input class="input" id="un-input" value="${userData?.username||''}" placeholder="username" style="margin-bottom:20px"><div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-secondary btn-sm" id="un-cancel">Cancel</button><button class="btn btn-primary btn-sm" id="un-save">Save</button></div></div>`;
  document.body.appendChild(overlay);
  const inp=$('un-input');const preview=$('un-preview');
  inp.addEventListener('input',()=>{preview.textContent=inp.value.toLowerCase().replace(/[^a-z0-9._-]/g,'');});
  $('un-cancel').onclick=()=>overlay.remove();
  $('un-save').onclick=async()=>{const ok=await updateUsername(currentUser.uid,inp.value);if(ok){overlay.remove();renderDashboard();}};
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  inp.focus();
};

// Bio handlers
window._updateBio = (k,v) => { bioState[k]=v; refreshBioPreview(); };
window._updateBioLink = (i,k,v) => { bioState.links[i][k]=v; refreshBioPreview(); };
window._removeBioLink = i => { bioState.links.splice(i,1); renderBio(); };
window._addBioLink = () => {
  if(userData?.plan!=='pro'&&bioState.links.length>=5){toast('Upgrade to Pro for unlimited links','error');return;}
  const overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal" style="max-width:420px"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">Add Link</h3><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;max-height:300px;overflow-y:auto">${linkPresets.map((p,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='var(--accent-subtle)';this.style.background='var(--accent-light)'" onmouseout="this.style.borderColor='var(--border)';this.style.background=''" onclick="window._selectLinkPreset(${i})"><i class="${p.icon}" style="color:${p.color};font-size:16px;width:20px;text-align:center"></i><span style="font-size:14px;font-weight:600;flex:1">${p.title}</span><i class="fa-solid fa-plus" style="color:var(--text-muted);font-size:12px"></i></div>`).join('')}</div><button class="btn btn-secondary btn-sm" style="width:100%" onclick="this.closest('.modal-overlay').remove()">Cancel</button></div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
};
window._selectLinkPreset = i => { bioState.links.push({...linkPresets[i],id:Date.now()}); document.querySelector('.modal-overlay')?.remove(); renderBio(); };
window._saveBio = async () => { if(!currentUser){toast('Sign in to save','error');return;} await saveBioData(currentUser.uid); toast('Bio saved & published!','success'); track('save_bio'); };

// Resume handlers
window._updateResume = (k,v) => { resumeState[k]=v; refreshResumePreview(); };
window._updateResumeSkills = v => { resumeState.skills=v.split(',').map(s=>s.trim()).filter(Boolean); refreshResumePreview(); };
window._updateExp = (i,k,v) => { resumeState.experiences[i][k]=v; refreshResumePreview(); };
window._addExp = () => { resumeState.experiences.push({company:'',role:'',period:'',desc:''}); renderResume(); };
window._removeExp = i => { resumeState.experiences.splice(i,1); renderResume(); };
window._updateEdu = (i,k,v) => { resumeState.education[i][k]=v; refreshResumePreview(); };
window._addEdu = () => { resumeState.education.push({school:'',degree:'',year:''}); renderResume(); };
window._removeEdu = i => { resumeState.education.splice(i,1); renderResume(); };
window._selectResumeTemplate = id => {
  if(id!=='standard'&&userData?.plan!=='pro'){toast('Upgrade to Pro for more templates','error');return;}
  resumeState.template=id; renderResume();
};
window._saveResume = async () => { if(!currentUser){toast('Sign in to save','error');return;} await saveResumeData(currentUser.uid); toast('Resume saved!','success'); track('save_resume'); };
window._exportResumePDF = () => {
  const el=$('resume-preview'); if(!el)return;
  toast('Generating PDF...','info');
  const opt={margin:0,filename:'resume.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}};
  html2pdf().set(opt).from(el).save().then(()=>{toast('Resume PDF exported!','success');track('export_resume_pdf');});
};

// Invoice handlers
window._updateInv = (k,v) => { invoiceState[k]=v; refreshInvoicePreview(); };
window._updateInvFrom = (k,v) => { invoiceState.from[k]=v; refreshInvoicePreview(); };
window._updateInvTo = (k,v) => { invoiceState.to[k]=v; refreshInvoicePreview(); };
window._updateInvItem = (i,k,v) => { invoiceState.items[i][k]=v; refreshInvoicePreview(); };
window._addInvItem = () => { invoiceState.items.push({desc:'',qty:1,price:0}); renderInvoice(); };
window._removeInvItem = i => { if(invoiceState.items.length>1){invoiceState.items.splice(i,1);renderInvoice();} };
window._saveInvoice = async () => { if(!currentUser){toast('Sign in to save','error');return;} await saveInvoiceData(currentUser.uid); toast('Invoice saved!','success'); track('save_invoice'); };
window._exportInvoicePDF = () => {
  const el=$('invoice-preview'); if(!el)return;
  toast('Generating PDF...','info');
  const opt={margin:10,filename:`${invoiceState.invoiceNo||'invoice'}.pdf`,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}};
  html2pdf().set(opt).from(el).save().then(()=>{toast('Invoice PDF exported!','success');track('export_invoice_pdf');});
};
window._sendInvoiceWhatsApp = () => {
  const sym=getCurSymbol();
  const total=invoiceState.items.reduce((s,i)=>s+(i.qty*i.price||0),0);
  const text=`Invoice ${invoiceState.invoiceNo}\nDate: ${invoiceState.date}\nTo: ${invoiceState.to.name}\nTotal: ${sym}${total.toFixed(2)}\n\nPlease find the full invoice in the attached PDF.`;
  const phone=(invoiceState.to.phone||'').replace(/[^0-9]/g,'');
  if(!phone){toast('Add client phone number to send via WhatsApp','error');return;}
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`,'_blank');
  track('send_invoice_whatsapp');
};

// WhatsApp Link handlers
window._updateWa = (k,v) => { waState[k]=v; renderWaLink(); };
window._selectWaTemplate = id => {
  if(!waTemplates.find(t=>t.id===id)?.free && userData?.plan!=='pro'){toast('Upgrade to Pro for this template','error');return;}
  waState.templateId=id; renderWaLink();
};
window._saveWaLink = async () => { if(!currentUser){toast('Sign in to save','error');return;} await saveWaData(currentUser.uid); toast('WhatsApp link saved!','success'); track('save_wa_link'); };
window._shareWaLink = () => {
  const selTemplate=waTemplates.find(t=>t.id===waState.templateId)||waTemplates[0];
  const link=selTemplate.generate(waState.phone,waState.message);
  if(navigator.share){navigator.share({title:'WhatsApp Link',url:link}).catch(()=>{});}
  else window._copyText(link);
};

/* ─── Responsive Grid ─── */
const style=document.createElement('style');
style.textContent=`@media(min-width:1024px){.lg-grid{grid-template-columns:1fr 340px !important}.lg-grid-equal{grid-template-columns:1fr 1fr !important}}`;
document.head.appendChild(style);

/* ─── Handle /username/bio routes ─── */
const path=window.location.pathname.replace(/\/$/,'');
if(path.startsWith('/')&&path.length>1){
  const slug=path.slice(1);
  if(slug.includes('/bio')){
    currentPage='public-bio';
    renderPublicBio(slug);
  } else {
    currentPage='public-bio';
    renderPublicBio(slug);
  }
} else {
  render();
}

</script>
